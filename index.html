<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
   <div class="container">
       <header>
         <h1>Wordly</h1>
         <p>Your interactive wordly dictionary</p>
       </header>
       <form id="search-form">
        <input type="text" id="search-input" placeholder="Search for a word..." required>
        <button type="submit" >search</button>
       </form>

        <div id="result-container" class="hidden"></div>
        <div id="error-message" class="hidden"></div>
   </div>
   <script src="index.js"></script>    
</body>
</html>
